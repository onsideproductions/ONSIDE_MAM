# ONSIDE MAM - NGINX config (HTTP only, no SSL)
# For IP-based access before domain/SSL is configured.
# When ready for SSL, run: sudo certbot --nginx -d yourdomain.com

server {
    listen 80 default_server;
    server_name _;

    # Logging
    access_log /var/log/nginx/onside-mam-access.log;
    error_log /var/log/nginx/onside-mam-error.log;

    # Frontend (SvelteKit on port 3000)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API (Fastify on port 3001)
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Standard API body limit
        client_max_body_size 10m;
    }

    # tus resumable uploads - special handling
    location /api/upload {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Critical: disable buffering for resumable uploads
        proxy_request_buffering off;
        proxy_buffering off;
        client_max_body_size 0;

        # Long timeouts for large file uploads
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # WebSocket support (upload/transcode progress)
    location /ws {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }

    # Health check (no access log noise)
    location /health {
        proxy_pass http://127.0.0.1:3001/health;
        access_log off;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
